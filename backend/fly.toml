# fly.toml app configuration file generated for newshawk-api on 2026-04-15T15:15:14-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'newshawk-api'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  NEWSHAWK_DB_PATH = '/data/articles.db'
  NEWSHAWK_RETENTION_DAYS = '14'

[[mounts]]
  source = 'newshawk_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 100
    soft_limit = 50

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
