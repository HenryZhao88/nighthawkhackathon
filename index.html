<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Snake Experience</title>
    <meta name="description" content="A modern, aesthetically pleasing web version of the classic Snake game.">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="game-container">
        <header class="game-header">
            <h1>Snake</h1>
            <div class="score-board">
                <div class="score-card">
                    <span class="score-label">Score</span>
                    <span id="score" class="score-value">0</span>
                </div>
                <div class="score-card">
                    <span class="score-label">High Score</span>
                    <span id="high-score" class="score-value">0</span>
                </div>
            </div>
        </header>
        
        <div class="canvas-wrapper">
            <div class="overlay" id="start-overlay">
                <h2>Ready to Play?</h2>
                <p>Use arrow keys to move</p>
                <button id="start-btn" class="glow-btn">Start Game</button>
            </div>
            
            <div class="overlay hidden" id="game-over-overlay">
                <h2>Game Over!</h2>
                <p>Your score: <span id="final-score">0</span></p>
                <button id="restart-btn" class="glow-btn">Play Again</button>
            </div>
            
            <canvas id="game-canvas" width="400" height="400"></canvas>
        </div>

        <footer class="game-controls">
            <p>Use keyboard arrow keys <b>↑ ↓ ← →</b> to play.</p>
        </footer>
    </main>
    <script src="script.js"></script>
</body>
</html>
