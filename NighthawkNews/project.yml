name: NighthawkNews
options:
  bundleIdPrefix: com.newshawk
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
packages:
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: 8.0.0
targets:
  NighthawkNews:
    type: application
    platform: iOS
    sources:
      - path: NighthawkNews
    dependencies:
      - package: GoogleSignIn
        product: GoogleSignIn
    entitlements:
      path: NighthawkNews/NighthawkNews.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
        keychain-access-groups:
          - $(AppIdentifierPrefix)com.newshawk.NewsHawkNews
    info:
      path: NighthawkNews/Info.plist
      properties:
        CFBundleDisplayName: NighthawkNews
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        GIDClientID: "43405219569-534pf0moie5i3n0tu5gdulahdqu93am7.apps.googleusercontent.com"
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - com.googleusercontent.apps.43405219569-534pf0moie5i3n0tu5gdulahdqu93am7
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.newshawk.NewsHawkNews
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"
