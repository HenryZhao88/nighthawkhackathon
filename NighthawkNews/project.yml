name: NighthawkNews
options:
  bundleIdPrefix: com.nighthawk
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
targets:
  NighthawkNews:
    type: application
    platform: iOS
    sources:
      - path: NighthawkNews
    info:
      path: NighthawkNews/Info.plist
      properties:
        CFBundleDisplayName: Nighthawk
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nighthawk.NighthawkNews
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
